mutation Login($email: String!, $password: String!) {
  login(input: { email: $email, password: $password }) {
    accessToken
    refreshToken
    expiresIn
    user {
      id
      email
      role
    }
  }
}

mutation Register(
  $email: String!
  $password: String!
  $firstName: String
  $lastName: String
) {
  register(
    input: {
      email: $email
      password: $password
      firstName: $firstName
      lastName: $lastName
    }
  ) {
    accessToken
    refreshToken
    expiresIn
    user {
      id
      email
      role
    }
  }
}

mutation RefreshToken($token: String!) {
  refreshToken(token: $token) {
    accessToken
    refreshToken
    expiresIn
  }
}

mutation AddToCart($productId: String!, $quantity: Int!) {
  addToCart(input: { productId: $productId, quantity: $quantity }) {
    id
    subtotal
    total
    items {
      id
      productId
      quantity
      unitPrice
      totalPrice
    }
  }
}

mutation RemoveFromCart($itemId: String!) {
  removeFromCart(input: { itemId: $itemId }) {
    id
    subtotal
    total
    items {
      id
      productId
      quantity
      unitPrice
      totalPrice
    }
  }
}

mutation CreateOrder($shippingAddress: JSON!) {
  createOrder(input: { shippingAddress: $shippingAddress }) {
    id
    orderNumber
    status
    total
  }
}
